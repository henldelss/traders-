<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Traders - Recharge Officielle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { margin: 0; background-color: #f8f8f8; color: #000; padding-bottom: 40px; }

        .header { background: #00A651; /* Noir changé en Vert */ color: #fff; padding: 20px; display: flex; align-items: center; gap: 15px; }
        .header a { color: #fff; text-decoration: none; }
        
        .container { padding: 15px; }
        .section-title { font-size: 14px; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; border-left: 4px solid #00A651; padding-left: 10px; }

        /* Grille des montants VIP */
        .amount-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .amount-card {
            background: #fff; border: 1.5px solid #eee; padding: 15px; border-radius: 10px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .amount-card.active { border-color: #00A651; background: #00A651; color: #fff; } /* Noir changé en Vert */
        .amount-card span { display: block; font-size: 10px; opacity: 0.7; }
        .amount-card strong { font-size: 15px; }

        /* Choix du Réseau */
        .network-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .network-option {
            background: #fff; border: 1.5px solid #eee; padding: 10px; border-radius: 10px;
            text-align: center; cursor: pointer; font-size: 11px; font-weight: bold;
        }
        .network-option.active { border-color: #00A651; background: #f0f0f0; } /* Noir changé en Vert */

        /* Affichage du numéro agent */
        .agent-display {
            background: #00A651; /* Noir changé en Vert */ color: #fff; padding: 20px; border-radius: 12px;
            display: none; text-align: center; margin-bottom: 20px;
        }
        .agent-number { font-size: 22px; font-weight: bold; letter-spacing: 2px; margin: 10px 0; display: block; }
        .btn-copy { background: #fff; color: #00A651; border: none; padding: 5px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* Formulaire de validation */
        .recharge-form { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #eee; display: none; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        .input-group input {
            width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px;
            outline: none; font-size: 14px;
        }

        .btn-submit {
            background: #00A651; /* Noir changé en Vert */ color: #fff; width: 100%; padding: 16px; border-radius: 30px;
            border: none; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer;
        }
        .btn-submit:disabled { background: #005c2c; } /* Gris foncé changé en Vert sombre */
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
        <h1 style="font-size: 18px; margin:0;">Recharger FC</h1>
    </div>

    <div class="container">
        
        <div class="section-title">1. Sélectionnez le montant (VIP)</div>
        <div class="amount-grid">
            <div class="amount-card" onclick="selectAmount(15000, this)"><span>VIP 1</span><strong>15,000 FC</strong></div>
            <div class="amount-card" onclick="selectAmount(30000, this)"><span>VIP 2</span><strong>30,000 FC</strong></div>
            <div class="amount-card" onclick="selectAmount(60000, this)"><span>VIP 3</span><strong>60,000 FC</strong></div>
            <div class="amount-card" onclick="selectAmount(120000, this)"><span>VIP 4</span><strong>120,000 FC</strong></div>
            <div class="amount-card" onclick="selectAmount(250000, this)"><span>VIP 5</span><strong>250,000 FC</strong></div>
            <div class="amount-card" onclick="selectAmount(450000, this)"><span>VIP 6</span><strong>450,000 FC</strong></div>
            <div class="amount-card" onclick="selectAmount(1000000, this)"><span>VIP 7</span><strong>1,000,000 FC</strong></div>
            <div class="amount-card" onclick="selectAmount(2000000, this)"><span>VIP 8</span><strong>2,000,000 FC</strong></div>
        </div>

        <div class="section-title">2. Choisissez votre réseau</div>
        <div class="network-grid">
            <div class="network-option" onclick="selectNetwork('Orange', '+243852771755', this)">Orange</div>
            <div class="network-option" onclick="selectNetwork('Airtel', '+243998566330', this)">Airtel</div>
            <div class="network-option" onclick="selectNetwork('M-PESA', '+243813944647', this)">M-PESA</div>
        </div>

        <div id="agentBox" class="agent-display">
            <p id="agentName" style="margin:0; font-size: 12px; opacity: 0.8;"></p>
            <span id="agentNum" class="agent-number"></span>
            <button class="btn-copy" onclick="copyNumber()">Copier le numéro</button>
        </div>

        <div id="rechargeForm" class="recharge-form">
            <div class="section-title" style="margin-top:0; border:none; padding:0;">3. Détails du transfert</div>
            <div class="input-group">
                <label>Numéro expéditeur (+243...)</label>
                <input type="tel" id="senderPhone" placeholder="Ex: 0895517195">
            </div>
            <div class="input-group">
                <label>ID de la transaction (TID)</label>
                <input type="text" id="transactionId" placeholder="Entrez l'ID du message reçu">
            </div>
            <button class="btn-submit" id="submitBtn" onclick="submitRecharge()">Soumettre recharge</button>
        </div>

    </div>

    <script>
        // URL DB mise à jour vers ton Firebase réel
        const dbUrl = "https://canal-e4274-default-rtdb.firebaseio.com/recharges_en_attente";
        const userPhone = localStorage.getItem('userPhone');
        
        let selectedAmount = 0;
        let selectedNetwork = "";

        if (!userPhone) { window.location.href = 'index.html'; }

        function selectAmount(amount, element) {
            selectedAmount = amount;
            document.querySelectorAll('.amount-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
        }

        function selectNetwork(name, number, element) {
            selectedNetwork = name;
            document.querySelectorAll('.network-option').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
            
            document.getElementById('agentBox').style.display = 'block';
            document.getElementById('agentName').innerText = "Numéro Agent " + name;
            document.getElementById('agentNum').innerText = number;
            
            document.getElementById('rechargeForm').style.display = 'block';
        }

        function copyNumber() {
            const num = document.getElementById('agentNum').innerText;
            navigator.clipboard.writeText(num).then(() => {
                alert("Numéro " + num + " copié ! Effectuez le transfert puis remplissez le formulaire.");
            }).catch(err => {
                console.error("Erreur de copie : ", err);
            });
        }

        async function submitRecharge() {
            const sender = document.getElementById('senderPhone').value.trim();
            const tid = document.getElementById('transactionId').value.trim();
            const btn = document.getElementById('submitBtn');

            if (selectedAmount === 0) { alert("Sélectionnez un montant."); return; }
            if (sender === "" || tid === "") { alert("Veuillez remplir tous les champs."); return; }

            btn.innerText = "Envoi en cours...";
            btn.disabled = true;

            const rechargeData = {
                userAccount: userPhone,
                senderPhone: sender,
                amount: selectedAmount,
                network: selectedNetwork,
                transactionID: tid,
                status: "en_attente",
                date: new Date().toLocaleString()
            };

            try {
                await fetch(`${dbUrl}.json`, {
                    method: 'POST',
                    body: JSON.stringify(rechargeData)
                });

                alert("Votre demande de recharge de " + selectedAmount.toLocaleString() + " FC a été envoyée. Elle sera validée après vérification du TID.");
                window.location.href = 'profil.html';
            } catch (error) {
                alert("Erreur de connexion. Veuillez réessayer.");
                btn.innerText = "Soumettre recharge";
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
